<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Placeholder</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #05080c;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      main {
        max-width: 720px;
        padding: 48px;
        border: 1px solid rgba(0, 210, 106, 0.55);
        border-radius: 24px;
        text-align: center;
      }
      h1 { color: #00d26a; }
      code { color: #00d26a; }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume Placeholder</h1>
      <p>
        Replace this file with your real resume file, then update the resume link
        in <code>src/data/profile.js</code> to <code>/resume.pdf</code>.
      </p>
    </main>
  </body>
</html>
